services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: repair_ai
      POSTGRES_USER: repair
      POSTGRES_PASSWORD: repair
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repair -d repair_ai"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
    env_file:
      - ./env.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
